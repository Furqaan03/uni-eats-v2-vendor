name: unieats_vendor
description: "Uni Eats - Vendor App. Manage your restaurant, your way."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.1.2

  shared_preferences: ^2.3.3
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1
  google_sign_in: ^6.2.2
  firebase_auth: ^5.3.4

  # Push notifications (client-side FCM HTTP v1 — see NOTIFICATIONS_PLAN.md).
  # firebase_messaging ^15.x is the line compatible with firebase_core ^3.x.
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  googleapis_auth: ^1.6.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/push/
